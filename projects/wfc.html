<section class="project">

<div class="carousel">

  <div class="carousel-track">

    <img src="../assets/wfc-5.png" alt="WFC post 5">

    <img src="../assets/wfc-7.png" alt="WFC post 7">

<div class="carousel">
  <button class="carousel-btn left" onclick="moveSlide(this, -1)">&#8249;</button>
  <div class="carousel-track">
    <img src="../assets/wfc-b-1.png" alt="WFC series B post 1">

  </div>
  <button class="carousel-btn right" onclick="moveSlide(this, 1)">&#8250;</button>
</div>

</section>

<script>
function moveSlide(button, direction) {
  const carousel = button.parentElement;
  const track = carousel.querySelector('.carousel-track');
  const slides = track.children;
  let index = parseInt(track.getAttribute('data-index') || 0);
  index += direction;
  if (index < 0) index = slides.length - 1;
  if (index >= slides.length) index = 0;
  track.style.transform = `translateX(-${index * 100}%)`;
  track.setAttribute('data-index', index);
}
</script>
